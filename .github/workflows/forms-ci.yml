# Forms Extension CI
# Runs only on manual dispatch (workflow_dispatch) — inert on push/PR until
# project-wide CI is wired up.
name: Forms Extension CI

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run Playwright E2E tests (requires running server)"
        type: boolean
        default: false

jobs:
  go-test:
    name: Go unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/forms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Run Go tests
        run: go test -race -coverprofile=cov.out ./cmd/plugin/...
      - name: Check coverage ≥ 80%
        run: go tool cover -func=cov.out | tail -1

  npm-test:
    name: Vitest component tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/forms/admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/forms/admin-ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_e2e == 'true' }}
    defaults:
      run:
        working-directory: extensions/forms/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/forms/e2e/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.VIBECMS_BASE_URL || 'http://localhost:3000' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'admin@test.local' }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS || 'admin123' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: extensions/forms/e2e/playwright-report/
