# Squilla — Coolify deployment
#
# Zero-config deploy:
#   1. In Coolify, create a new Resource → Public Repository → point at this repo.
#   2. Build pack: Docker Compose. Compose file: coolify-compose.yml.
#   3. Set the Domain on the `app` service (Coolify fills SERVICE_FQDN_APP).
#   4. Click Deploy.
#
# All secrets (DB user/password, session secret, monitor token) are
# generated by Coolify on first deploy via SERVICE_* magic variables.
#
# First admin password is generated on first boot and printed to the
# `app` container logs ONCE — copy it, log in, change it.
# To pre-set credentials, add ADMIN_EMAIL and ADMIN_PASSWORD env vars
# to the `app` service in Coolify before the first deploy.

services:
  app:
    image: ghcr.io/erikkubica/squilla:latest
    environment:
      - PORT=8099
      - APP_ENV=production
      # Magic-var declarations: Coolify auto-generates the SERVICE_*
      # values (URL from the bound domain, BASE64/PASSWORD from random
      # bytes) and exports them into the deploy shell, where the
      # ${VAR:-default} substitutions below pick them up.
      #
      # SERVICE_FQDN_APP_8099 is intentionally NOT used: Coolify fills
      # it with the auto-generated internal subdomain (something like
      # app-xxx.example.com:8099), not the user-bound domain — wrong
      # for CORS. SERVICE_URL_APP carries the actual public origin
      # ("https://your-domain.tld") whenever a domain is bound.
      - SERVICE_URL_APP
      - SERVICE_BASE64_SECRETKEY
      - SERVICE_BASE64_64_SESSION
      - SERVICE_BASE64_64_MONITOR
      - SERVICE_USER_POSTGRES
      - SERVICE_PASSWORD_POSTGRES
      # Each line below uses `${X:-$Y}` so a manual override in the
      # Coolify dashboard's Environment Variables tab wins, falling back
      # to the magic-generated value otherwise. Without the override
      # form, compose's environment: block would clobber UI overrides.
      - CORS_ORIGINS=${CORS_ORIGINS:-$SERVICE_URL_APP}
      # AES-256 master key (32 raw bytes after base64 decode). Override
      # in the UI by pasting `openssl rand -base64 32`.
      - SQUILLA_SECRET_KEY=${SQUILLA_SECRET_KEY:-$SERVICE_BASE64_SECRETKEY}
      # DB credentials passed as discrete vars rather than crammed into
      # DATABASE_URL — SERVICE_PASSWORD_POSTGRES can contain '+/=' and
      # other URL-meaningful chars that break libpq parsing.
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-$SERVICE_USER_POSTGRES}
      - DB_PASSWORD=${DB_PASSWORD:-$SERVICE_PASSWORD_POSTGRES}
      - DB_NAME=squilla
      # `db` is on the compose private network; config.Validate allows
      # sslmode=disable for non-public DB hosts.
      - DB_SSLMODE=disable
      - SESSION_SECRET=${SESSION_SECRET:-$SERVICE_BASE64_64_SESSION}
      - SESSION_EXPIRY_HOURS=24
      - MONITOR_BEARER_TOKEN=${MONITOR_BEARER_TOKEN:-$SERVICE_BASE64_64_MONITOR}
      - STORAGE_DRIVER=local
      - STORAGE_PATH=/app/storage
    expose:
      - "8099"
    volumes:
      - squilla-storage:/app/storage
      # Persistent operator data — themes installed via git/zip/MCP and
      # operator-deployed extensions live here. Image-bundled themes and
      # extensions stay in /app/themes and /app/extensions inside the
      # image; the scanner reads both.
      - squilla-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8099/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      # Same UI-override-friendly form as the app service. If the user
      # set DB_USER/DB_PASSWORD on the app side, the same values must be
      # used here so the credentials match.
      - POSTGRES_USER=${DB_USER:-$SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-$SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=squilla
    volumes:
      - squilla-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d squilla"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  squilla-storage:
  squilla-data:
  squilla-pgdata:
