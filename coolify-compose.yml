# VibeCMS â€” Coolify deployment
#
# Zero-config deploy:
#   1. In Coolify, create a new Resource â†’ Public Repository â†’ point at this repo.
#   2. Build pack: Docker Compose. Compose file: coolify-compose.yml.
#   3. Set the Domain on the `app` service (Coolify fills SERVICE_FQDN_APP).
#   4. Click Deploy.
#
# All secrets (DB user/password, session secret, monitor token) are
# generated by Coolify on first deploy via SERVICE_* magic variables.
#
# First admin password is generated on first boot and printed to the
# `app` container logs ONCE â€” copy it, log in, change it.
# To pre-set credentials, add ADMIN_EMAIL and ADMIN_PASSWORD env vars
# to the `app` service in Coolify before the first deploy.

services:
  app:
    image: ghcr.io/erikkubica/vibecms:latest
    environment:
      - PORT=8099
      - APP_ENV=production
      - SERVICE_FQDN_APP_8099
      # Public origin used for CORS allowlist. Coolify fills
      # SERVICE_FQDN_APP_8099 once a domain is bound to the app service
      # in the dashboard â€” until then this expands to "https://" and
      # the validator will refuse to start. Set the domain first.
      - CORS_ORIGINS=https://$SERVICE_FQDN_APP_8099
      # AES-256 master key for at-rest encryption of theme git tokens
      # and secret-shaped settings. internal/secrets expects exactly
      # 32 raw bytes after base64 decode â€” Coolify's SERVICE_BASE64_<NAME>
      # produces that (the longer SERVICE_BASE64_64_<NAME> would fail
      # because it generates 64 bytes, not 32).
      - VIBECMS_SECRET_KEY=$SERVICE_BASE64_SECRETKEY
      # DB credentials are passed as separate vars rather than crammed
      # into a DATABASE_URL: SERVICE_PASSWORD_POSTGRES routinely contains
      # shell special chars including '$', and embedding it in a URL
      # makes docker-compose re-expand fragments like "$dht5mbz9" as
      # phantom variables (warnings + a mangled password reaching the
      # container). Individual env vars sidestep that entirely.
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=$SERVICE_USER_POSTGRES
      - DB_PASSWORD=$SERVICE_PASSWORD_POSTGRES
      - DB_NAME=vibecms
      # sslmode=disable is acceptable here because `db` is on the
      # compose private network; config.Validate allows it for
      # non-public DB hosts.
      - DB_SSLMODE=disable
      - SESSION_SECRET=$SERVICE_BASE64_64_SESSION
      - SESSION_EXPIRY_HOURS=24
      - MONITOR_BEARER_TOKEN=$SERVICE_BASE64_64_MONITOR
      - STORAGE_DRIVER=local
      - STORAGE_PATH=/app/storage
    expose:
      - "8099"
    volumes:
      - vibecms-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8099/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=$SERVICE_USER_POSTGRES
      - POSTGRES_PASSWORD=$SERVICE_PASSWORD_POSTGRES
      - POSTGRES_DB=vibecms
    volumes:
      - vibecms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d vibecms"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  vibecms-storage:
  vibecms-pgdata:
