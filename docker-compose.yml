services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibecms
      POSTGRES_PASSWORD: vibecms_secret
      POSTGRES_DB: vibecms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecms"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
