services:
  app:
    image: vibecms:local
    build: .
    ports:
      - "8099:8099"
    environment:
      PORT: "8099"
      APP_ENV: development
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: vibecms
      DB_PASSWORD: vibecms_secret
      DB_NAME: vibecms
      DB_SSLMODE: disable
      SESSION_SECRET: change-me-to-a-random-64-char-string
      SESSION_EXPIRY_HOURS: "24"
      MONITOR_BEARER_TOKEN: change-me-to-a-random-token
      STORAGE_DRIVER: local
      STORAGE_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vibecms
      POSTGRES_PASSWORD: vibecms_secret
      POSTGRES_DB: vibecms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecms"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
