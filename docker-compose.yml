services:
  app:
    image: squilla:local
    build: .
    ports:
      - "8099:8099"
    environment:
      PORT: "8099"
      APP_ENV: development
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: squilla
      DB_PASSWORD: squilla_secret
      DB_NAME: squilla
      DB_SSLMODE: disable
      SESSION_SECRET: change-me-to-a-random-64-char-string
      SESSION_EXPIRY_HOURS: "24"
      MONITOR_BEARER_TOKEN: change-me-to-a-random-token
      STORAGE_DRIVER: local
      STORAGE_PATH: /app/storage
      # Dev defaults so smoke tests / local login keep working.
      # In production (coolify-compose.yml) ADMIN_PASSWORD is unset, so
      # a random one is generated and printed to logs on first boot.
      ADMIN_EMAIL: admin@squilla.local
      ADMIN_PASSWORD: admin123
    volumes:
      - ./storage:/app/storage
      # Persistent operator data — themes installed via git/zip/MCP and
      # operator-deployed extensions live here so they survive container
      # restarts. Image-bundled themes and extensions stay in /app/themes
      # and /app/extensions (read-only intent); the scanner reads both.
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: squilla
      POSTGRES_PASSWORD: squilla_secret
      POSTGRES_DB: squilla
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squilla"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
