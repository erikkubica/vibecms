<section class="vb-cb-accordion py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-accordion" data-allow-multiple="{{.allow_multiple}}">
  <div class="max-w-6xl mx-auto">
    {{if .heading}}
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-text);">{{.heading}}</h2>
    </div>
    {{end}}

    <div class="max-w-3xl mx-auto">
      {{range $i, $item := .items}}
      <div class="vb-cb-accordion__item{{if eq $item.is_open "true"}} vb-cb-accordion__item--open{{end}}">
        <button class="vb-cb-accordion__header" type="button" aria-expanded="{{$item.is_open}}">
          <span class="vb-cb-accordion__header-text">{{$item.title}}</span>
          <svg class="vb-cb-accordion__chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="vb-cb-accordion__panel"{{if eq $item.is_open "true"}} style="max-height: none;"{{end}}>
          <div class="vb-cb-accordion__panel-inner leading-relaxed" style="color: var(--color-text-muted);">
            {{$item.content}}
          </div>
        </div>
      </div>
      {{end}}
    </div>
  </div>
</section>
