<section class="vb-cb-alert vb-cb-alert--{{.type}} px-4 sm:px-6 lg:px-8 py-4" data-block="cb-alert" data-dismissible="{{.dismissible}}">
  <div class="max-w-6xl mx-auto">
    <div class="vb-cb-alert__inner rounded-lg flex items-center gap-3 px-5 py-4">
      {{if .icon}}
      <span class="vb-cb-alert__icon"><i data-lucide="{{.icon}}" class="vb-icon"></i></span>
      {{end}}

      <div class="vb-cb-alert__content flex-1 flex items-center gap-3 flex-wrap">
        <div class="vb-cb-alert__message text-sm font-medium leading-relaxed">{{.message}}</div>
        {{if and .link_text .link_url}}
        <a href="{{.link_url}}" class="vb-cb-alert__link text-sm font-semibold no-underline whitespace-nowrap hover:underline">{{.link_text}} &rarr;</a>
        {{end}}
      </div>

      {{if eq .dismissible true}}
      <button class="vb-cb-alert__close flex-shrink-0 p-1 rounded border-none cursor-pointer opacity-60 hover:opacity-100 transition-opacity duration-150" type="button" aria-label="Dismiss alert" style="background: none; color: inherit;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      {{end}}
    </div>
  </div>
</section>
