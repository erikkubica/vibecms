<section class="vb-cb-before-after py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-before-after">
  <div class="max-w-6xl mx-auto">
    {{if .heading}}
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-text);">{{.heading}}</h2>
    </div>
    {{end}}
    <div class="max-w-3xl mx-auto">
      <div class="vb-cb-before-after__wrapper rounded-lg overflow-hidden relative select-none cursor-ew-resize">
        <img src="{{with .after_image}}{{.url}}{{end}}" alt="{{if .after_label}}{{.after_label}}{{else}}After{{end}}" class="vb-cb-before-after__img block w-full h-auto pointer-events-none" draggable="false" />
        <div class="vb-cb-before-after__before absolute inset-0 overflow-hidden" style="clip-path: inset(0 50% 0 0);">
          <img src="{{with .before_image}}{{.url}}{{end}}" alt="{{if .before_label}}{{.before_label}}{{else}}Before{{end}}" class="vb-cb-before-after__img w-full h-full object-cover pointer-events-none" draggable="false" />
        </div>
        <div class="vb-cb-before-after__handle absolute top-0 bottom-0 w-0 z-10" style="left: 50%;">
          <div class="vb-cb-before-after__handle-line"></div>
          <div class="vb-cb-before-after__handle-knob">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
        <span class="vb-cb-before-after__label vb-cb-before-after__label--before">{{if .before_label}}{{.before_label}}{{else}}Before{{end}}</span>
        <span class="vb-cb-before-after__label vb-cb-before-after__label--after">{{if .after_label}}{{.after_label}}{{else}}After{{end}}</span>
      </div>
    </div>
  </div>
</section>
