<section class="vb-cb-code-block py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-code-block">
  <div class="max-w-6xl mx-auto">
    <div class="max-w-4xl mx-auto">
      <div class="vb-cb-code-block__container rounded-lg overflow-hidden" style="border: 1px solid #313244;">
        {{if .language}}
        <div class="vb-cb-code-block__header">
          <span class="vb-cb-code-block__lang text-xs font-semibold uppercase tracking-wider">{{.language}}</span>
        </div>
        {{end}}
        <div class="vb-cb-code-block__body">
          <pre class="vb-cb-code-block__pre"><code>{{.code}}</code></pre>
        </div>
      </div>
      {{if .caption}}
      <p class="text-sm mt-3 text-center" style="color: var(--color-text-muted);">{{.caption}}</p>
      {{end}}
    </div>
  </div>
</section>
