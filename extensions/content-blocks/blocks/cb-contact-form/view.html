<section class="vb-cb-contact-form vb-cb-contact-form--{{.style}}" data-block="cb-contact-form" data-action="{{.form_action}}" data-success="{{.success_message}}">
  <div class="py-16 md:py-24 px-4 sm:px-6 lg:px-8">
    <div class="vb-cb-contact-form__wrapper">
      <div class="vb-cb-contact-form__header text-center mb-12">
        {{if .heading}}
        <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="color: var(--color-text);">{{.heading}}</h2>
        {{end}}
        {{if .description}}
        <p class="text-lg leading-relaxed max-w-2xl mx-auto" style="color: var(--color-text-muted);">{{.description}}</p>
        {{end}}
      </div>

      <form class="vb-cb-contact-form__form" novalidate>
        <div class="vb-cb-contact-form__row">
          <div class="vb-cb-contact-form__field">
            <label class="vb-cb-contact-form__label text-sm font-semibold" style="color: var(--color-text);" for="cf-name">Name <span class="vb-cb-contact-form__required">*</span></label>
            <input type="text" id="cf-name" name="name" class="vb-cb-contact-form__input rounded-lg" required placeholder="Your name" style="border-color: var(--color-border);" />
            <span class="vb-cb-contact-form__error" data-field="name"></span>
          </div>
          <div class="vb-cb-contact-form__field">
            <label class="vb-cb-contact-form__label text-sm font-semibold" style="color: var(--color-text);" for="cf-email">Email <span class="vb-cb-contact-form__required">*</span></label>
            <input type="email" id="cf-email" name="email" class="vb-cb-contact-form__input rounded-lg" required placeholder="your@email.com" style="border-color: var(--color-border);" />
            <span class="vb-cb-contact-form__error" data-field="email"></span>
          </div>
        </div>

        {{if eq .show_phone true}}
        <div class="vb-cb-contact-form__field">
          <label class="vb-cb-contact-form__label text-sm font-semibold" style="color: var(--color-text);" for="cf-phone">Phone</label>
          <input type="tel" id="cf-phone" name="phone" class="vb-cb-contact-form__input rounded-lg" placeholder="Your phone number" style="border-color: var(--color-border);" />
        </div>
        {{end}}

        {{if eq .show_subject true}}
        <div class="vb-cb-contact-form__field">
          <label class="vb-cb-contact-form__label text-sm font-semibold" style="color: var(--color-text);" for="cf-subject">Subject</label>
          <input type="text" id="cf-subject" name="subject" class="vb-cb-contact-form__input rounded-lg" placeholder="What is this about?" style="border-color: var(--color-border);" />
        </div>
        {{end}}

        <div class="vb-cb-contact-form__field">
          <label class="vb-cb-contact-form__label text-sm font-semibold" style="color: var(--color-text);" for="cf-message">Message <span class="vb-cb-contact-form__required">*</span></label>
          <textarea id="cf-message" name="message" class="vb-cb-contact-form__input vb-cb-contact-form__textarea rounded-lg" required placeholder="Your message..." rows="5" style="border-color: var(--color-border);"></textarea>
          <span class="vb-cb-contact-form__error" data-field="message"></span>
        </div>

        <button type="submit" class="inline-flex items-center justify-center px-6 py-3 text-base font-semibold rounded-lg transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5" style="background-color: var(--color-accent); color: var(--color-accent-text);">
          <span class="vb-cb-contact-form__button-text">{{.button.text}}</span>
          <svg class="vb-cb-contact-form__button-spinner ml-2" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"></circle>
          </svg>
        </button>

        <div class="vb-cb-contact-form__feedback rounded-lg" style="display: none;"></div>
      </form>
    </div>
  </div>
</section>
