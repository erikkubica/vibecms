<section class="vb-cb-features-grid py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-features-grid">
  <div class="max-w-7xl mx-auto">
    {{if or .heading .subheading}}
    <div class="text-center mb-12">
      {{if .heading}}<h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="color: var(--color-text);">{{.heading}}</h2>{{end}}
      {{if .subheading}}<p class="text-lg leading-relaxed max-w-2xl mx-auto" style="color: var(--color-text-muted);">{{.subheading}}</p>{{end}}
    </div>
    {{end}}
    <div class="vb-cb-features-grid__grid vb-cb-features-grid__grid--cols-{{.columns}}">
      {{range .features}}
      <div class="vb-cb-features-grid__card rounded-lg p-6 transition-all duration-200 flex flex-col" style="background: var(--color-surface); border: 1px solid var(--color-border);">
        {{if .icon}}<span class="vb-cb-features-grid__icon text-3xl mb-3"><i data-lucide="{{.icon}}" class="vb-icon"></i></span>{{end}}
        {{if .category}}<span class="inline-block self-start text-xs font-semibold uppercase tracking-wide rounded-full px-2.5 py-1 mb-3" style="color: var(--color-accent); background-color: rgba(0, 0, 0, 0.04);">{{.category}}</span>{{end}}
        <h3 class="text-lg font-semibold mb-2" style="color: var(--color-text);">{{.title}}</h3>
        <p class="leading-relaxed flex-1" style="color: var(--color-text-muted);">{{.description}}</p>
        {{if and .link_text .link_url}}
        <a href="{{.link_url}}" class="vb-cb-features-grid__link inline-block mt-4 font-semibold transition-opacity duration-150 hover:opacity-80" style="color: var(--color-accent);">{{.link_text}} &rarr;</a>
        {{end}}
      </div>
      {{end}}
    </div>
  </div>
</section>
