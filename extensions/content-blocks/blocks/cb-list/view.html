<section class="vb-cb-list">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
      {{if .heading}}
        <h2 class="text-3xl font-bold mb-8" style="color: var(--color-text);">{{.heading}}</h2>
      {{end}}

      <ul class="vb-cb-list__items space-y-4">
        {{range $i, $item := .items}}
          <li class="vb-cb-list__item flex gap-3">
            <span class="vb-cb-list__marker flex-shrink-0 mt-1">
              {{if eq $.style "check"}}
                <svg class="vb-cb-list__check" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="10" cy="10" r="10" fill="var(--color-accent)" />
                  <path d="M6 10l2.5 3L14 7" stroke="var(--color-accent-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              {{else if eq $.style "numbered"}}
                <span class="vb-cb-list__number">{{add $i 1}}</span>
              {{else}}
                <span class="vb-cb-list__bullet"></span>
              {{end}}
            </span>
            <div>
              <span class="font-semibold" style="color: var(--color-text);">{{$item.title}}</span>
              {{if $item.description}}
                <p class="mt-1 text-sm" style="color: var(--color-text-muted);">{{$item.description}}</p>
              {{end}}
            </div>
          </li>
        {{end}}
      </ul>
    </div>
  </div>
</section>
