<section class="vb-cb-paragraph py-16 md:py-24 px-4 sm:px-6 lg:px-8">
  <div class="{{if eq .max_width "narrow"}}max-w-2xl{{else if eq .max_width "wide"}}max-w-5xl{{else}}max-w-3xl{{end}} mx-auto">
    {{if .heading}}
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="color: var(--color-text);">{{.heading}}</h2>
    {{end}}
    <div class="vb-cb-paragraph__body leading-relaxed" style="color: var(--color-text-muted);">
      {{.body}}
    </div>
  </div>
</section>
