<section class="py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-recent-posts" data-node-type="{{.node_type}}" data-count="{{.count}}" data-layout="{{.layout}}" data-columns="{{.columns}}" data-show-image="{{.show_image}}" data-show-excerpt="{{.show_excerpt}}" data-show-date="{{.show_date}}" data-link-text="{{.link_text}}">
  <div class="max-w-7xl mx-auto">
    {{if .heading}}
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-text);">{{.heading}}</h2>
    </div>
    {{end}}

    <div class="vb-cb-recent-posts__container" data-layout="{{.layout}}" data-columns="{{.columns}}">
      <!-- Skeleton loading state -->
      <div class="vb-cb-recent-posts__skeleton">
        <div class="vb-cb-recent-posts__skeleton-card"></div>
        <div class="vb-cb-recent-posts__skeleton-card"></div>
        <div class="vb-cb-recent-posts__skeleton-card"></div>
      </div>
    </div>
  </div>
</section>
