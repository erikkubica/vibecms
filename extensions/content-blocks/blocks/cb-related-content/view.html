<section class="py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-related-content" data-node-type="{{.node_type}}" data-count="{{.count}}" data-show-image="{{.show_image}}">
  <div class="max-w-7xl mx-auto">
    {{if .heading}}
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-text);">{{.heading}}</h2>
    </div>
    {{end}}

    <div class="vb-cb-related-content__track">
      <!-- Cards rendered via JS -->
      <div class="vb-cb-related-content__skeleton">
        <div class="vb-cb-related-content__skeleton-card"></div>
        <div class="vb-cb-related-content__skeleton-card"></div>
        <div class="vb-cb-related-content__skeleton-card"></div>
        <div class="vb-cb-related-content__skeleton-card"></div>
      </div>
    </div>
  </div>
</section>
