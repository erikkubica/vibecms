<section class="vb-cb-slider" data-block="cb-slider" data-autoplay="{{.autoplay}}">
  <div class="vb-cb-slider__track">
    {{range $index, $slide := .slides}}
      <div class="vb-cb-slider__slide {{if eq $index 0}}vb-cb-slider__slide--active{{end}}" style="background-image: url('{{$slide.image}}');">
        <div class="vb-cb-slider__overlay"></div>
        <div class="vb-cb-slider__content max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
          {{if $slide.heading}}
            <h2 class="vb-cb-slider__heading text-3xl md:text-4xl font-bold tracking-tight">{{$slide.heading}}</h2>
          {{end}}
          {{if $slide.description}}
            <p class="vb-cb-slider__description text-lg leading-relaxed">{{$slide.description}}</p>
          {{end}}
          {{if and $slide.button.text $slide.button.url}}
            <a href="{{$slide.button.url}}" class="vb-cb-slider__button inline-flex items-center justify-center px-6 py-3 text-base font-semibold rounded-lg transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5" style="background-color: var(--color-accent); color: var(--color-accent-text);">{{$slide.button.text}}</a>
          {{end}}
        </div>
      </div>
    {{end}}
  </div>
  <button class="vb-cb-slider__arrow vb-cb-slider__arrow--prev" aria-label="Previous slide">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="vb-cb-slider__arrow vb-cb-slider__arrow--next" aria-label="Next slide">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="vb-cb-slider__dots">
    {{range $index, $slide := .slides}}
      <button class="vb-cb-slider__dot {{if eq $index 0}}vb-cb-slider__dot--active{{end}}" data-slide="{{$index}}" aria-label="Go to slide {{$index}}"></button>
    {{end}}
  </div>
</section>
