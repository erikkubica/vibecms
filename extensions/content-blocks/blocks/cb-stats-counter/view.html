<section class="vb-cb-stats-counter vb-cb-stats-counter--{{.style}} py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-stats-counter">
  <div class="max-w-6xl mx-auto">
    {{if .heading}}
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight text-center mb-12" style="color: var(--color-text);">{{.heading}}</h2>
    {{end}}
    <div class="vb-cb-stats-counter__grid">
      {{range .stats}}
      <div class="vb-cb-stats-counter__item">
        {{if .icon}}<span class="vb-cb-stats-counter__icon"><i data-lucide="{{.icon}}" class="vb-icon"></i></span>{{end}}
        <div class="vb-cb-stats-counter__number">
          {{if .prefix}}<span class="vb-cb-stats-counter__prefix">{{.prefix}}</span>{{end}}<span class="vb-stats-counter__value" data-target="{{.number}}">0</span>{{if .suffix}}<span class="vb-cb-stats-counter__suffix">{{.suffix}}</span>{{end}}
        </div>
        <div class="vb-cb-stats-counter__label leading-relaxed" style="color: var(--color-text-muted);">{{.label}}</div>
      </div>
      {{end}}
    </div>
  </div>
</section>
