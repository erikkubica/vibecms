<section class="vb-team-members" data-block="cb-team-members">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    {{if .heading}}
    <div class="vb-team-members__header">
      <h2 class="vb-team-members__heading">{{.heading}}</h2>
      {{if .subheading}}
      <p class="vb-team-members__subheading">{{.subheading}}</p>
      {{end}}
    </div>
    {{end}}
    <div class="vb-team-members__grid vb-team-members__grid--cols-{{.columns}}">
      {{range .members}}
      <div class="vb-team-members__card">
        {{if .photo}}
        <img src="{{.photo}}" alt="{{.name}}" class="vb-team-members__photo vb-team-members__photo--{{$.photo_style}}" loading="lazy" />
        {{end}}
        <h3 class="vb-team-members__name">{{.name}}</h3>
        <p class="vb-team-members__role">{{.role}}</p>
        {{if .bio}}
        <p class="vb-team-members__bio">{{.bio}}</p>
        {{end}}
        <div class="vb-team-members__social">
          {{if .linkedin}}
          <a href="{{.linkedin}}" class="vb-team-members__social-link" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" title="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
          {{end}}
          {{if .twitter}}
          <a href="{{.twitter}}" class="vb-team-members__social-link" target="_blank" rel="noopener noreferrer" aria-label="Twitter" title="Twitter">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
          </a>
          {{end}}
          {{if .email}}
          <a href="mailto:{{.email}}" class="vb-team-members__social-link" aria-label="Email" title="Email">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </a>
          {{end}}
        </div>
      </div>
      {{end}}
    </div>
  </div>
</section>
