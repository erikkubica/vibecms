<section class="vb-cb-timeline py-16 md:py-24 px-4 sm:px-6 lg:px-8" data-block="cb-timeline">
  <div class="max-w-6xl mx-auto">
    {{if .heading}}
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-text);">{{.heading}}</h2>
    </div>
    {{end}}

    <div class="vb-cb-timeline__container vb-cb-timeline__container--{{.style}}">
      <div class="vb-cb-timeline__line"></div>

      {{range $i, $item := .items}}
      <div class="vb-cb-timeline__item">
        <div class="vb-cb-timeline__dot"></div>
        <div class="vb-cb-timeline__content rounded-lg p-6" style="background: var(--color-surface); border: 1px solid var(--color-border);">
          <span class="vb-cb-timeline__date">{{$item.date}}</span>
          <h3 class="text-lg font-semibold" style="color: var(--color-text);">{{$item.title}}</h3>
          <p class="vb-cb-timeline__description leading-relaxed" style="color: var(--color-text-muted);">{{$item.description}}</p>
          {{if $item.image}}
          <img src="{{$item.image}}" alt="{{$item.title}}" class="vb-cb-timeline__image" loading="lazy" />
          {{end}}
        </div>
      </div>
      {{end}}
    </div>
  </div>
</section>
