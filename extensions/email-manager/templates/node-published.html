<div style="font-family: sans-serif; max-width: 600px; margin: 0 auto;">
  <h2 style="margin:0 0 16px 0; color:#1e293b;">Content Published</h2>
  <p style="margin:0 0 12px 0; color:#475569; line-height:1.6;">
    Hi {{.user_full_name}}, your {{.node_type}} "<strong>{{.node_title}}</strong>" has been published on {{.site_name}}.
  </p>
  <p style="margin:0 0 24px 0;">
    <a href="{{.site_url}}{{.node_url}}" style="display:inline-block; padding:10px 20px; background-color:#2563eb; color:#ffffff; text-decoration:none; border-radius:8px; font-weight:600; font-size:14px;">View Post</a>
  </p>
</div>
