<div style="font-family: sans-serif; max-width: 600px; margin: 0 auto;">
  <h2 style="margin:0 0 16px 0; color:#1e293b;">Reset Your Password</h2>
  <p style="margin:0 0 16px 0; color:#475569; line-height:1.6;">
    Hi {{.user_full_name}}, you requested a password reset for your account on <strong>{{.site_name}}</strong>.
  </p>
  <p style="margin:0 0 24px 0;">
    <a href="{{.reset_url}}" style="display:inline-block; padding:12px 24px; background-color:#2563eb; color:#ffffff; text-decoration:none; border-radius:8px; font-weight:600; font-size:14px;">Reset Password</a>
  </p>
  <p style="margin:0; color:#94a3b8; font-size:13px; line-height:1.6;">
    If you didn't request this, you can safely ignore this email.
  </p>
</div>
