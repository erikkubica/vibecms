<div style="font-family: sans-serif; max-width: 600px; margin: 0 auto;">
  <h2 style="margin:0 0 16px 0; color:#1e293b;">New User Registered</h2>
  <p style="margin:0 0 12px 0; color:#475569; line-height:1.6;">
    A new user has registered on <strong>{{.site_name}}</strong>.
  </p>
  <table style="width:100%; border-collapse:collapse; margin:16px 0;">
    <tr>
      <td style="padding:8px 12px; border:1px solid #e2e8f0; color:#64748b; font-size:13px;">Name</td>
      <td style="padding:8px 12px; border:1px solid #e2e8f0; color:#1e293b;">{{.user_full_name}}</td>
    </tr>
    <tr>
      <td style="padding:8px 12px; border:1px solid #e2e8f0; color:#64748b; font-size:13px;">Email</td>
      <td style="padding:8px 12px; border:1px solid #e2e8f0; color:#1e293b;">{{.user_email}}</td>
    </tr>
  </table>
</div>
