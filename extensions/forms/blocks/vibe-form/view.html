{{ if .form_id }}
    <div class="vibe-form-wrapper" id="form-{{ .form_id }}">
        {{ if .heading }}
            <h2 class="form-heading">{{ .heading }}</h2>
        {{ end }}
        
        {{ $rendered := event "forms:render" (dict "form_id" .form_id) }}
        {{ if $rendered }}
            {{ safeHTML $rendered }}
        {{ else }}
            <div class="form-error">Failed to load form.</div>
        {{ end }}
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const wrapper = document.getElementById('form-{{ .form_id }}');
        const form = wrapper.querySelector('form');
        
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const submitBtn = form.querySelector('[type="submit"]');
                const originalBtnText = submitBtn ? submitBtn.innerHTML : 'Submit';
                
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner"></span> Submitting...';
                }

                const formData = new FormData(form);
                const data = {};
                formData.forEach((value, key) => {
                    if (data[key]) {
                        if (!Array.isArray(data[key])) {
                            data[key] = [data[key]];
                        }
                        data[key].push(value);
                    } else {
                        data[key] = value;
                    }
                });

                try {
                    const response = await fetch('/api/ext/forms/submit/{{ .form_id }}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();
                    
                    if (response.ok) {
                        // Success handling
                        form.innerHTML = `<div class="form-success-message">${result.message || 'Thank you! Your submission has been received.'}</div>`;
                    } else {
                        alert(result.error || 'Something went wrong. Please try again.');
                    }
                } catch (error) {
                    console.error('Form submission error:', error);
                    alert('Failed to submit form. Please check your connection.');
                } finally {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalBtnText;
                    }
                }
            });
        }
    });
    </script>

    <style>
    .vibe-form-wrapper {
        margin-bottom: 2rem;
    }
    .form-heading {
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
        font-weight: 700;
    }
    .form-success-message {
        padding: 1.5rem;
        background: #f0fdf4;
        color: #166534;
        border-radius: 0.5rem;
        border: 1px solid #bbf7d0;
        text-align: center;
    }
    .form-error {
        color: #b91c1c;
        padding: 1rem;
        background: #fef2f2;
        border-radius: 0.5rem;
        border: 1px solid #fecaca;
    }
    .spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
        margin-right: 0.5rem;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    </style>
{{ end }}
