syntax = "proto3";
package vibecmsplugin;

option go_package = "vibecms/pkg/plugin/proto";

service ExtensionPlugin {
  // GetSubscriptions returns the list of events this plugin wants to handle.
  rpc GetSubscriptions(Empty) returns (SubscriptionList);

  // HandleEvent is called when a subscribed event fires.
  rpc HandleEvent(EventRequest) returns (EventResponse);

  // Shutdown tells the plugin to clean up and exit gracefully.
  rpc Shutdown(Empty) returns (Empty);
}

message Empty {}

message Subscription {
  string event_name = 1;
  int32 priority = 2;
}

message SubscriptionList {
  repeated Subscription subscriptions = 1;
}

message EventRequest {
  string action = 1;
  bytes payload = 2; // JSON-encoded event payload
}

message EventResponse {
  bool handled = 1;
  string error = 2;
  bytes result = 3; // JSON-encoded result data (optional)
}
