syntax = "proto3";
package vibecmsplugin;

option go_package = "vibecms/pkg/plugin/proto";

service ExtensionPlugin {
  // GetSubscriptions returns the list of events this plugin wants to handle.
  rpc GetSubscriptions(Empty) returns (SubscriptionList);

  // HandleEvent is called when a subscribed event fires.
  rpc HandleEvent(EventRequest) returns (EventResponse);

  // Shutdown tells the plugin to clean up and exit gracefully.
  rpc Shutdown(Empty) returns (Empty);

  // Initialize passes the host service broker ID so the plugin can call back.
  rpc Initialize(InitializeRequest) returns (Empty);

  // HandleHTTPRequest proxies an admin API request to the plugin.
  rpc HandleHTTPRequest(PluginHTTPRequest) returns (PluginHTTPResponse);
}

message Empty {}

message InitializeRequest {
  uint32 host_service_id = 1;
}

message Subscription {
  string event_name = 1;
  int32 priority = 2;
}

message SubscriptionList {
  repeated Subscription subscriptions = 1;
}

message EventRequest {
  string action = 1;
  bytes payload = 2; // JSON-encoded event payload
}

message EventResponse {
  bool handled = 1;
  string error = 2;
  bytes result = 3; // JSON-encoded result data (optional)
}

message PluginHTTPRequest {
  string method = 1;
  string path = 2;              // path relative to /admin/api/ext/{slug}/
  map<string, string> headers = 3;
  bytes body = 4;
  map<string, string> query_params = 5;
  map<string, string> path_params = 6;  // e.g., :id from routes
  uint64 user_id = 7;           // authenticated user ID
}

message PluginHTTPResponse {
  int32 status_code = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}
