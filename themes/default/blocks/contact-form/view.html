<section class="vb-contact-form py-16 px-4">
  <div class="max-w-2xl mx-auto">
    {{if .heading}}
    <h2 class="text-3xl font-bold text-center mb-4" style="color: var(--color-text);">{{.heading}}</h2>
    {{end}}
    {{if .subheading}}
    <p class="text-center mb-10 text-lg" style="color: var(--color-text-muted);">{{.subheading}}</p>
    {{end}}
    <div class="rounded-lg p-8 border" style="background: var(--color-surface); border-color: var(--color-border); border-radius: var(--radius);">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2" style="color: var(--color-text);">Name</label>
          <input
            type="text"
            class="vb-contact-input w-full px-4 py-3 rounded-md border outline-none"
            style="background: var(--color-surface-alt); border-color: var(--color-border); color: var(--color-text); border-radius: var(--radius);"
            placeholder="Your name"
            disabled
          />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2" style="color: var(--color-text);">{{.email_label}}</label>
          <input
            type="email"
            class="vb-contact-input w-full px-4 py-3 rounded-md border outline-none"
            style="background: var(--color-surface-alt); border-color: var(--color-border); color: var(--color-text); border-radius: var(--radius);"
            placeholder="you@example.com"
            disabled
          />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2" style="color: var(--color-text);">{{.message_label}}</label>
          <textarea
            class="vb-contact-input w-full px-4 py-3 rounded-md border outline-none resize-y"
            style="background: var(--color-surface-alt); border-color: var(--color-border); color: var(--color-text); border-radius: var(--radius);"
            rows="5"
            placeholder="Your message..."
            disabled
          ></textarea>
        </div>
        <div>
          <button
            type="button"
            class="vb-contact-button w-full py-3 px-6 rounded-md font-semibold transition-colors duration-200"
            style="background: var(--color-accent); color: var(--color-accent-text); border-radius: var(--radius);"
            disabled
          >
            {{.button_text}}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
