{{- /* CTA — 1:1 Stitch "Footer CTA" markup */ -}}
<section>
<div class="bg-gradient-to-br from-primary to-primary-container rounded-xl p-16 md:p-24 text-center text-white space-y-8 relative overflow-hidden shadow-2xl">
<div class="absolute top-0 left-0 w-full h-full opacity-10 bento-grid-bg"></div>
<div class="relative z-10 space-y-6">
<h2 class="text-5xl md:text-7xl font-extrabold sora tracking-tighter text-white">{{.heading}}</h2>
{{if .body}}
<p class="text-xl md:text-2xl text-on-primary-container max-w-2xl mx-auto font-light">{{.body}}</p>
{{end}}
<div class="flex flex-col md:flex-row justify-center gap-4 pt-6">
{{- if .button.url }}
<a href="{{.button.url}}" class="inline-block bg-white text-primary hover:text-primary px-12 py-5 rounded-lg text-lg font-bold sora hover:bg-surface transition-all">{{.button.text}}</a>
{{- end }}
{{- if .button_secondary.url }}
<a href="{{.button_secondary.url}}" class="inline-block bg-white/10 backdrop-blur-md text-white hover:text-white border border-white/20 hover:bg-white/20 px-12 py-5 rounded-lg text-lg font-bold sora transition-all">{{.button_secondary.text}}</a>
{{- end }}
</div>
</div>
</div>
</section>
