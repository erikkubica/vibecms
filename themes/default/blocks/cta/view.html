{{if eq .style "accent"}}
<section class="vb-cta vb-cta--accent py-20 md:py-32 px-4 sm:px-6 lg:px-8" style="background-color: var(--color-accent);">
  <div class="max-w-3xl mx-auto text-center">
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-4">{{.heading}}</h2>
    {{if .body}}
    <p class="text-lg leading-relaxed text-white/80 mb-12 max-w-2xl mx-auto">{{.body}}</p>
    {{end}}
    <a href="{{.button_url}}" class="vb-cta__button inline-flex items-center justify-center px-6 py-3 text-base font-semibold rounded-lg transition-all duration-200 bg-white hover:shadow-lg hover:-translate-y-0.5" style="color: var(--color-accent);">
      {{.button_text}}
    </a>
  </div>
</section>
{{else if eq .style "dark"}}
<section class="vb-cta vb-cta--dark py-20 md:py-32 px-4 sm:px-6 lg:px-8" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
  <div class="max-w-3xl mx-auto text-center">
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-4">{{.heading}}</h2>
    {{if .body}}
    <p class="text-lg leading-relaxed text-white/80 mb-12 max-w-2xl mx-auto">{{.body}}</p>
    {{end}}
    <a href="{{.button_url}}" class="vb-cta__button inline-flex items-center justify-center px-6 py-3 text-base font-semibold rounded-lg text-white transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5" style="background-color: var(--color-accent);">
      {{.button_text}}
    </a>
  </div>
</section>
{{else}}
<section class="vb-cta vb-cta--light py-20 md:py-32 px-4 sm:px-6 lg:px-8" style="background-color: var(--color-surface-alt);">
  <div class="max-w-3xl mx-auto text-center">
    <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="color: var(--color-text);">{{.heading}}</h2>
    {{if .body}}
    <p class="text-lg leading-relaxed mb-12 max-w-2xl mx-auto" style="color: var(--color-text-muted);">{{.body}}</p>
    {{end}}
    <a href="{{.button_url}}" class="vb-cta__button inline-flex items-center justify-center px-6 py-3 text-base font-semibold rounded-lg text-white transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5" style="background-color: var(--color-accent);">
      {{.button_text}}
    </a>
  </div>
</section>
{{end}}
