{{- /* FAQ — 1:1 Stitch markup */ -}}
<section class="max-w-3xl mx-auto space-y-12">
{{if or .heading .subheading}}
<div class="text-center space-y-4">
{{if .heading}}<h2 class="text-4xl font-bold sora tracking-tight text-on-surface">{{.heading}}</h2>{{end}}
{{if .subheading}}<p class="text-on-surface-variant">{{.subheading}}</p>{{end}}
</div>
{{end}}
<div class="space-y-4">
{{range $item := .items}}
<details class="group bg-surface-container-low rounded-lg p-6 border border-outline-variant/10">
<summary class="flex justify-between items-center font-bold sora cursor-pointer list-none text-on-surface">
{{$item.question}}
<span class="material-symbols-outlined group-open:rotate-180 transition-transform" data-icon="expand_more">expand_more</span>
</summary>
<div class="mt-4 text-on-surface-variant leading-relaxed">{{$item.answer | safeHTML}}</div>
</details>
{{end}}
</div>
</section>
