<section class="vb-features-grid py-16 md:py-24 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    {{if or .heading .subheading}}
    <div class="text-center mb-12">
      {{if .heading}}
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="color: var(--color-text);">{{.heading}}</h2>
      {{end}}
      {{if .subheading}}
      <p class="text-lg leading-relaxed max-w-2xl mx-auto" style="color: var(--color-text-muted);">{{.subheading}}</p>
      {{end}}
    </div>
    {{end}}

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      {{range .features}}
      <div class="vb-features-grid__card rounded-lg p-6 transition-all duration-200" style="background: var(--color-surface); border: 1px solid var(--color-border);">
        {{if .icon}}
        <div class="vb-features-grid__icon text-3xl mb-4">{{.icon}}</div>
        {{end}}
        <h3 class="text-lg font-semibold mb-2" style="color: var(--color-text);">{{.title}}</h3>
        <p class="text-sm leading-relaxed" style="color: var(--color-text-muted);">{{.description}}</p>
      </div>
      {{end}}
    </div>
  </div>
</section>
