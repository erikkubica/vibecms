<section class="vibe-features-grid py-16 px-4">
  <div class="max-w-7xl mx-auto">
    {{if or .heading .subheading}}
    <div class="text-center mb-12">
      {{if .heading}}
      <h2 class="text-3xl sm:text-4xl font-bold mb-3" style="color: var(--color-text);">{{.heading}}</h2>
      {{end}}
      {{if .subheading}}
      <p class="text-lg max-w-2xl mx-auto" style="color: var(--color-text-muted);">{{.subheading}}</p>
      {{end}}
    </div>
    {{end}}

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      {{range .features}}
      <div class="vibe-features-grid__card rounded-lg p-6 transition-shadow duration-200" style="background-color: white; border: 1px solid var(--color-border);">
        {{if .icon}}
        <div class="vibe-features-grid__icon text-3xl mb-4">{{.icon}}</div>
        {{end}}
        <h3 class="text-lg font-semibold mb-2" style="color: var(--color-text);">{{.title}}</h3>
        <p class="text-sm leading-relaxed" style="color: var(--color-text-muted);">{{.description}}</p>
      </div>
      {{end}}
    </div>
  </div>
</section>
