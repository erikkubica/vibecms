{{- /* Features Grid — 1:1 Stitch markup, dynamic features array */ -}}
<section class="space-y-12">
{{if or .heading .subheading}}
<div class="text-center space-y-4">
{{if .heading}}<h2 class="text-4xl font-bold sora tracking-tight text-on-surface">{{.heading}}</h2>{{end}}
{{if .subheading}}<p class="text-on-surface-variant max-w-xl mx-auto">{{.subheading}}</p>{{end}}
</div>
{{end}}
<div class="grid md:grid-cols-3 gap-8">
{{range $i, $f := .features}}
<div class="bg-surface-container-lowest p-10 rounded-lg space-y-4 hover:scale-[1.01] transition-all shadow-sm group">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary text-2xl group-hover:bg-primary group-hover:text-white transition-colors">{{$f.icon}}</div>
<h3 class="text-xl font-bold sora text-on-surface">{{$f.title}}</h3>
<p class="text-on-surface-variant leading-relaxed">{{$f.description}}</p>
</div>
{{end}}
</div>
</section>
