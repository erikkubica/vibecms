<section class="vibe-gallery py-16 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="vibe-gallery__grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      {{range .images}}
      <div class="vibe-gallery__item group">
        <div class="rounded-lg overflow-hidden vibe-gallery__image-wrapper">
          <img
            src="{{.image}}"
            alt="{{.caption}}"
            class="w-full aspect-[4/3] object-cover transition-transform duration-300 group-hover:scale-105"
            loading="lazy"
          />
        </div>
        {{if .caption}}
        <p class="vibe-gallery__caption mt-2 text-sm" style="color: var(--color-text-muted);">{{.caption}}</p>
        {{end}}
      </div>
      {{end}}
    </div>
  </div>
</section>
