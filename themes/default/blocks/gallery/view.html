<section class="vb-gallery py-16 md:py-24 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      {{range .images}}
      <div class="vb-gallery__item group">
        <div class="vb-gallery__img-wrap rounded-lg overflow-hidden">
          <img
            src="{{.image}}"
            alt="{{.caption}}"
            class="w-full aspect-[4/3] object-cover transition-transform duration-300 group-hover:scale-105"
            loading="lazy"
          />
        </div>
        {{if .caption}}
        <p class="mt-2 text-sm leading-relaxed" style="color: var(--color-text-muted);">{{.caption}}</p>
        {{end}}
      </div>
      {{end}}
    </div>
  </div>
</section>
