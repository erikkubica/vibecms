{{- $imgPos := "left" -}}
{{- if .image_position -}}{{- $imgPos = .image_position -}}{{- end -}}

<section class="vb-image-text py-16 md:py-24 px-4 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-6xl grid grid-cols-1 md:grid-cols-2 gap-8 items-center">

    {{/* Image column */}}
    <div class="{{ if eq $imgPos "right" }}md:order-2{{ end }}">
      <div class="vb-image-text__img-wrap overflow-hidden rounded-lg">
        <img src="{{ .image }}" alt="{{ .heading }}" class="vb-image-text__img w-full h-auto object-cover" loading="lazy" />
      </div>
    </div>

    {{/* Text column */}}
    <div class="{{ if eq $imgPos "right" }}md:order-1{{ end }}">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="color: var(--color-text);">
        {{ .heading }}
      </h2>

      {{- if .body }}
      <div class="prose prose-lg mb-8 leading-relaxed" style="--tw-prose-body: var(--color-text-muted); --tw-prose-links: var(--color-accent); --tw-prose-bold: var(--color-text);">
        {{ .body | safeHTML }}
      </div>
      {{- end }}

      {{- if and .button_text .button_url }}
      <a href="{{ .button_url }}"
         class="inline-flex items-center justify-center px-6 py-3 text-base font-semibold rounded-lg transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5"
         style="background-color: var(--color-accent); color: var(--color-accent-text);">
        {{ .button_text }}
      </a>
      {{- end }}
    </div>

  </div>
</section>
