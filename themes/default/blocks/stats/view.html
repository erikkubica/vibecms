{{- /* Stats — 1:1 Stitch markup, first stat uses violet */ -}}
<section class="space-y-12">
{{if .heading}}
<div class="text-center">
<h2 class="text-4xl font-bold sora tracking-tight text-on-surface">{{.heading}}</h2>
</div>
{{end}}
<div class="grid grid-cols-2 md:grid-cols-4 gap-6">
{{range $i, $s := .stats}}
<div class="bg-surface-container-lowest p-8 rounded-lg text-center space-y-2 border border-outline-variant/10 shadow-sm">
<div class="text-4xl font-bold sora {{if eq $i 0}}text-primary{{else}}text-on-surface{{end}}">{{if $s.prefix}}{{$s.prefix}}{{end}}{{$s.number}}{{if $s.suffix}}{{$s.suffix}}{{end}}</div>
<div class="text-sm text-on-surface-variant sora">{{$s.label}}</div>
</div>
{{end}}
</div>
</section>
