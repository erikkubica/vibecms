<section class="vb-stats py-16 px-4">
  <div class="max-w-7xl mx-auto">
    {{if .heading}}
    <h2 class="text-3xl font-bold text-center mb-12" style="color: var(--color-text);">{{.heading}}</h2>
    {{end}}
    <div class="vb-stats-container rounded-lg p-8 md:p-12" style="background: var(--color-surface-alt); border-radius: var(--radius);">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-8 md:gap-12">
        {{range .stats}}
        <div class="vb-stat-item text-center">
          <div class="vb-stat-number text-4xl md:text-5xl font-bold mb-2" style="color: var(--color-accent);">
            {{if .prefix}}<span class="vb-stat-prefix">{{.prefix}}</span>{{end}}{{.number}}{{if .suffix}}<span class="vb-stat-suffix">{{.suffix}}</span>{{end}}
          </div>
          <div class="text-sm md:text-base font-medium" style="color: var(--color-text-muted);">{{.label}}</div>
        </div>
        {{end}}
      </div>
    </div>
  </div>
</section>
