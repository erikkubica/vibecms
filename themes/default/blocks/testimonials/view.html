<section class="vb-testimonials py-16 md:py-24 px-4 sm:px-6 lg:px-8" style="background-color: var(--color-surface-alt);">
  <div class="max-w-7xl mx-auto">
    {{if .heading}}
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight" style="color: var(--color-text);">{{.heading}}</h2>
    </div>
    {{end}}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      {{range .testimonials}}
      <div class="vb-testimonials__card flex flex-col rounded-lg p-6 transition-all duration-200" style="background: var(--color-surface); border: 1px solid var(--color-border);">
        <div class="vb-testimonials__quote-mark text-4xl leading-none mb-2" style="color: var(--color-border);">&ldquo;</div>
        <blockquote class="italic mb-6 leading-relaxed" style="color: var(--color-text);">{{.quote}}</blockquote>
        <div class="flex items-center mt-auto">
          {{if .avatar}}
          <img src="{{.avatar}}" alt="{{.author_name}}" class="w-10 h-10 rounded-full object-cover mr-3 flex-shrink-0" />
          {{else}}
          <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 text-sm font-bold flex-shrink-0" style="background: var(--color-accent); color: var(--color-accent-text);">
            {{slice .author_name 0 1}}
          </div>
          {{end}}
          <div>
            <div class="text-sm font-semibold" style="color: var(--color-text);">{{.author_name}}</div>
            {{if .author_role}}
            <div class="text-sm" style="color: var(--color-text-muted);">{{.author_role}}</div>
            {{end}}
          </div>
        </div>
      </div>
      {{end}}
    </div>
  </div>
</section>
