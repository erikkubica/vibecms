{{- $menu := index .app.menus "footer-nav" -}}
{{- if $menu -}}
<nav class="flex flex-wrap justify-center md:justify-end gap-8">
    {{- range $menu.items -}}
    <a href="{{.url}}" class="text-zinc-500 hover:text-zinc-900 transition-colors opacity-80 hover:opacity-100 text-sm font-light">{{.title}}</a>
    {{- end -}}
</nav>
{{- end -}}
