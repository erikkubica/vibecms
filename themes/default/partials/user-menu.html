{{- /* User menu — 1:1 Stitch: Log In text + Get Started gradient pill */ -}}
<div class="flex items-center gap-4">
    {{if .user.logged_in}}
    <a href="/admin" class="text-sm font-medium sora text-zinc-600 hover:text-primary transition-all duration-300">Dashboard</a>
    <a href="/logout" class="inline-flex items-center px-6 py-2 rounded-full text-sm font-bold sora text-white bg-gradient-to-r from-primary to-primary-container hover:scale-[1.02] active:scale-90 transition-transform">Logout</a>
    {{else}}
    <a href="/login" class="text-sm font-medium sora text-zinc-600 hover:text-primary transition-all duration-300">Log In</a>
    <a href="/register" class="inline-flex items-center px-6 py-2 rounded-full text-sm font-bold sora text-white bg-gradient-to-r from-primary to-primary-container hover:scale-[1.02] active:scale-90 transition-transform">Get Started</a>
    {{end}}
</div>
