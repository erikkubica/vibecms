<section class="section"><div class="container"><div style="background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%); border-radius: var(--r-xl); padding: 56px 64px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 48px; align-items: center; color: var(--white); position: relative; overflow: hidden;"><div style="position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255, 210, 0, 0.15);"></div><div style="position: absolute; bottom: -60px; right: 120px; width: 140px; height: 140px; border-radius: 50%; background: rgba(255, 210, 0, 0.1);"></div><div style="position: relative;">{{ with .badge_text }}<span class="badge badge-yellow" style="margin-bottom: 16px;">{{ . }}</span>{{ end }}{{ with .heading }}<h2 style="color: var(--white); margin-bottom: 14px;">{{ . }}</h2>{{ end }}{{ with .body }}<p style="opacity: 0.9; margin-bottom: 24px; font-size: 1.02rem;">{{ . }}</p>{{ end }}<div class="vibe-form-wrapper" data-form-slug="newsletter" id="form-newsletter">{{ safeHTML (event "forms:render" (dict "form_id" "newsletter")) }}</div><link rel="stylesheet" href="/extensions/forms/blocks/vibe-form/style.css"><script src="/extensions/forms/blocks/vibe-form/script.js" defer></script></div><div class="ph yellow has-photo" style="height: 280px; border-radius: var(--r-lg); transform: rotate(3deg); box-shadow: var(--shadow-lg); background-image: url(&quot;/theme/assets/images/lead-magnet-map.webp&quot;);">{{ with .image_label }}<span class="ph-label">{{ . }}</span>{{ end }}</div></div></div></section>
